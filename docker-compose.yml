version: "3.8"
services:
  monitor:
    build: .
    container_name: counterpart-monitor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - "CMD"
        - "sh"
        - "-c"
        - >-
          test -f data/readiness.json &&
          bun -e "const h=JSON.parse(require('fs').readFileSync('data/readiness.json','utf8'));
          const age=Date.now()-new Date(h.updatedAt).getTime();
          if(h.status!=='ready'||!h.updatedAt||age>120000)process.exit(1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
